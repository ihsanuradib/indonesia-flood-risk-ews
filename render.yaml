# Render.com blueprint for the FastAPI backend (free tier compatible).
# Deploy: push to GitHub, then "New > Blueprint" on render.com and pick this repo.
services:
  - type: web
    name: indonesia-flood-risk-ews-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.4"
    plan: free
